services:

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:5000"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teamboard-net
    volumes:
      - teamboard-db:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "${PORTAINER_PORT}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  teamboard-net:
    driver: bridge

volumes:
  teamboard-db:
  portainer_data: