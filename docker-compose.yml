services:

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:8080"
    networks:
      - teamboard-net

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:5000"
    networks:
      - teamboard-net

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - teamboard-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "${PORTAINER_PORT}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  teamboard-net:
    driver: bridge

volumes: 
  portainer_data: